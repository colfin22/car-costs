# Car Costs — Home Assistant package: renewal reminders + per-car stats.
#
# Drop this file into your HA config's packages/ folder (needs
#   homeassistant:
#     packages: !include_dir_named packages
# in configuration.yaml), replace <app-host> and the notify service, then run a
# config check and reload REST/template entities + automations (no restart needed).
#
# ONE HTTP poll, ALL cars. The single REST sensor below fetches /api/summary —
# every car plus all upcoming dues in one payload — and holds them in its
# attributes:
#   state_attr('sensor.car_costs_summary', 'cars')   # list of every car + stats
#   state_attr('sensor.car_costs_summary', 'dues')   # combined upcoming dues
# The reminders automation reads the 'dues' attribute, so it covers every car
# automatically — add a car in the app and nothing here needs changing.
#
# You only need the OPTIONAL section at the bottom if you want each car as its
# own sensor entity (for history graphs or per-car automations). HA's YAML
# can't loop entities out of a list, so that part needs one small block per car.

rest:
  # The one poll everything derives from. State = days to the soonest due
  # across all cars; the full payload rides along as attributes.
  - resource: http://<app-host>:8000/api/summary
    scan_interval: 3600
    sensor:
      - name: Car costs summary
        unique_id: car_costs_summary
        value_template: "{{ value_json.next_days }}"
        unit_of_measurement: d
        json_attributes:
          - cars
          - dues
          - year

automation:
  # Covers every car with no per-car config — reads the combined dues list.
  - id: car_costs_due_reminders
    alias: Car costs - renewal reminders (30d/7d)
    triggers:
      - trigger: time
        at: "09:00:00"
    actions:
      - repeat:
          for_each: >-
            {{ state_attr('sensor.car_costs_summary', 'dues')
               | selectattr('days', 'in', [30, 7]) | list }}
          sequence:
            - variables:
                msg: >-
                  {{ repeat.item.car }}: {{ repeat.item.item }} due
                  {{ repeat.item.date }} ({{ repeat.item.days }} days)
            # Add one action per phone that should get the nudge.
            - action: notify.mobile_app_your_phone
              data:
                title: Car reminder
                message: "{{ msg }}"

# ===================================================================
# OPTIONAL — one sensor entity per car.
#
# Everything above already exposes every car via the summary sensor's
# attributes; you only need this if you want per-car *entities* (history
# graphs, per-car automations). HA can't generate entities from a list, so
# copy the "Car N" group per car and change the id in each selectattr(...),
# the names, and the unique_ids (car1 → car2 → …).
# ===================================================================
template:
  - sensor:
      # ----- Car 1 -----
      - name: Family car year cost
        unique_id: car_costs_car1_year_total
        unit_of_measurement: "€"
        availability: >-
          {{ (state_attr('sensor.car_costs_summary','cars') or [])
             | selectattr('id','eq',1) | list | count > 0 }}
        state: >-
          {% set c = (state_attr('sensor.car_costs_summary','cars') or [])
             | selectattr('id','eq',1) | first %}
          {{ c.total }}
        attributes:
          by_category: >-
            {% set c = (state_attr('sensor.car_costs_summary','cars') or [])
               | selectattr('id','eq',1) | first | default(none) %}
            {{ c.by_category if c else {} }}

      - name: Family car mileage
        unique_id: car_costs_car1_mileage
        unit_of_measurement: km
        availability: >-
          {% set c = (state_attr('sensor.car_costs_summary','cars') or [])
             | selectattr('id','eq',1) | first | default(none) %}
          {{ c is not none and c.current_odo is not none }}
        state: >-
          {% set c = (state_attr('sensor.car_costs_summary','cars') or [])
             | selectattr('id','eq',1) | first %}
          {{ c.current_odo | round(0) }}

      - name: Family car fuel efficiency
        unique_id: car_costs_car1_l100km
        unit_of_measurement: L/100km
        availability: >-
          {% set c = (state_attr('sensor.car_costs_summary','cars') or [])
             | selectattr('id','eq',1) | first | default(none) %}
          {{ c is not none and c.l_per_100km is not none }}
        state: >-
          {% set c = (state_attr('sensor.car_costs_summary','cars') or [])
             | selectattr('id','eq',1) | first %}
          {{ c.l_per_100km }}

      - name: Family car cost per km
        unique_id: car_costs_car1_cost_per_km
        unit_of_measurement: "€/km"
        availability: >-
          {% set c = (state_attr('sensor.car_costs_summary','cars') or [])
             | selectattr('id','eq',1) | first | default(none) %}
          {{ c is not none and c.cost_per_km is not none }}
        state: >-
          {% set c = (state_attr('sensor.car_costs_summary','cars') or [])
             | selectattr('id','eq',1) | first %}
          {{ c.cost_per_km | round(2) }}

      - name: Family car next due
        unique_id: car_costs_car1_next_due
        unit_of_measurement: d
        availability: >-
          {% set c = (state_attr('sensor.car_costs_summary','cars') or [])
             | selectattr('id','eq',1) | first | default(none) %}
          {{ c is not none and c.next_due is not none }}
        state: >-
          {% set c = (state_attr('sensor.car_costs_summary','cars') or [])
             | selectattr('id','eq',1) | first %}
          {{ c.next_due.days }}
        attributes:
          item: >-
            {% set c = (state_attr('sensor.car_costs_summary','cars') or [])
               | selectattr('id','eq',1) | first | default(none) %}
            {{ c.next_due.item if c and c.next_due else none }}
          date: >-
            {% set c = (state_attr('sensor.car_costs_summary','cars') or [])
               | selectattr('id','eq',1) | first | default(none) %}
            {{ c.next_due.date if c and c.next_due else none }}

      - name: Family car charge cost
        unique_id: car_costs_car1_charge_total
        unit_of_measurement: "€"
        availability: >-
          {% set c = (state_attr('sensor.car_costs_summary','cars') or [])
             | selectattr('id','eq',1) | first | default(none) %}
          {{ c is not none and c.ev_enabled == 1 }}
        state: >-
          {% set c = (state_attr('sensor.car_costs_summary','cars') or [])
             | selectattr('id','eq',1) | first %}
          {{ c.by_category.charge | default(0) }}
      # ----- end Car 1 -----
